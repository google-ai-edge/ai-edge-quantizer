# YAML schema for GitHub Actions:
# https://help.github.com/en/actions/automating-your-workflow-with-github-actions/workflow-syntax-for-github-actions
#
# Helpful YAML parser to clarify YAML syntax:
# https://yaml-online-parser.appspot.com/
#
# This workflow will run nightly or when triggered from PR comment

name: Python Unit Tests

on:
  merge_group:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:  # Allow manual triggers
  workflow_call:
    inputs:
      trigger-sha:
        required: true
        type: string


jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    runs-on: ${{ matrix.os }}
    name: "Run Unit Tests with Python ${{ matrix.python-version }} on ${{ matrix.os }}"

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Set uv platform requirements
      # Set the `required-environment` in `uv` to the current platform and requested Python version.
      # This ensures that versions of rapidly-changing dependencies, e.g. `ai-edge-litert-nightly`,
      # which don't contain the required version, are skipped (for details on how uv resolves
      # dependencies, see https://docs.astral.sh/uv/concepts/resolution/#required-environments).
      shell: bash
      run: |
        python -c "import sys
        import platform
        print('\n[tool.uv]')
        print('required-environments = [')
        print(f'    \"sys_platform == \'{sys.platform}\' and platform_machine == \'{platform.machine()}\' and python_version == \'${{ matrix.python-version }}\'\",')
        print(']')
        " >> pyproject.toml
        uv sync \
          --python ${{ matrix.python-version }} \
          --all-packages

    - name: Run tests
      shell: bash
      run: |
        uv run \
          --python ${{ matrix.python-version }} \
          pytest
